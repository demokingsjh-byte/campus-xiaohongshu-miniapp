name: Campus Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Package backend
        working-directory: campus-platform
        run: mvn -B -pl yudao-server -am package -DskipTests

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: campus-platform/yudao-ui/yudao-ui-admin-vue3-full/pnpm-lock.yaml

      - name: Build admin UI
        working-directory: campus-platform/yudao-ui/yudao-ui-admin-vue3-full
        run: |
          pnpm install --frozen-lockfile
          pnpm build:prod

      - name: Prepare release bundle
        shell: bash
        run: |
          mkdir -p release
          cp campus-platform/yudao-server/target/*.jar release/campus-backend.jar
          tar -czf release/campus-admin-ui-dist.tar.gz -C campus-platform/yudao-ui/yudao-ui-admin-vue3-full dist
          cp docs/UPDATE_PIPELINE.md release/UPDATE_PIPELINE.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Campus Platform ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            release/campus-backend.jar
            release/campus-admin-ui-dist.tar.gz
            release/UPDATE_PIPELINE.md
